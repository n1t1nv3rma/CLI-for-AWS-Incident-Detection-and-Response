service_name: "API Gateway HTTP"

templates:
  - name: "IDR-APIGatewayHTTP-5xxErrorRate"
    service: "API Gateway HTTP"
    alarm_type: "RELIABILITY"
    metric_type: "NATIVE"
    description: "Monitors HTTP API 5xx error rates as a percentage of total traffic"
    configuration:
      AlarmName: "IDR-APIGatewayHTTP-5xxErrorRate-${api_name}"
      AlarmDescription: "Monitors HTTP API 5xx error rates as a percentage of total traffic"
      Metrics: [
        {
          Id: "m1",
          ReturnData: false,
          MetricStat: {
            Metric: {
              Namespace: "AWS/ApiGateway",
              MetricName: "5xx",
              Dimensions: [
                {
                  Name: "ApiId",
                  Value: "${api_id}"
                }
              ]
            },
            Period: 60,
            Stat: "Sum"
          }
        },
        {
          Id: "m2",
          ReturnData: false,
          MetricStat: {
            Metric: {
              Namespace: "AWS/ApiGateway",
              MetricName: "Count",
              Dimensions: [
                {
                  Name: "ApiId",
                  Value: "${api_id}"
                }
              ]
            },
            Period: 60,
            Stat: "Sum"
          }
        },
        {
          Id: "expr",
          ReturnData: true,
          Expression: "(m1/m2)*100",
          Label: "5xx Error Rate"
        }
      ]
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 5.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway HTTP"
      }
    ]

  - name: "IDR-APIGatewayHTTP-4xxErrorRate"
    service: "API Gateway HTTP"
    alarm_type: "RELIABILITY"
    metric_type: "NATIVE"
    description: "Monitors HTTP API 4xx error rates as a percentage of total traffic"
    configuration:
      AlarmName: "IDR-APIGatewayHTTP-4xxErrorRate-${api_name}"
      AlarmDescription: "Monitors HTTP API 4xx error rates as a percentage of total traffic"
      Metrics: [
        {
          Id: "m1",
          ReturnData: false,
          MetricStat: {
            Metric: {
              Namespace: "AWS/ApiGateway",
              MetricName: "4xx",
              Dimensions: [
                {
                  Name: "ApiId",
                  Value: "${api_id}"
                }
              ]
            },
            Period: 60,
            Stat: "Sum"
          }
        },
        {
          Id: "m2",
          ReturnData: false,
          MetricStat: {
            Metric: {
              Namespace: "AWS/ApiGateway",
              MetricName: "Count",
              Dimensions: [
                {
                  Name: "ApiId",
                  Value: "${api_id}"
                }
              ]
            },
            Period: 60,
            Stat: "Sum"
          }
        },
        {
          Id: "expr",
          ReturnData: true,
          Expression: "(m1/m2)*100",
          Label: "4xx Error Rate"
        }
      ]
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 5.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway HTTP"
      }
    ]

  - name: "IDR-APIGatewayHTTP-Latency"
    service: "API Gateway HTTP"
    alarm_type: "PERFORMANCE"
    metric_type: "NATIVE"
    description: "Response time monitoring provides insight into end user experience and performance"
    configuration:
      AlarmName: "IDR-APIGatewayHTTP-Latency-${api_name}"
      AlarmDescription: "Response time monitoring provides insight into end user experience and performance"
      MetricName: "Latency"
      Namespace: "AWS/ApiGateway"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 5000.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "ApiId",
          Value: "${api_id}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway HTTP"
      }
    ]

  - name: "IDR-APIGatewayHTTP-IntegrationLatency"
    service: "API Gateway HTTP"
    alarm_type: "PERFORMANCE"
    metric_type: "NATIVE"
    description: "Measures the time taken between when API Gateway forwards a request to the backend and receives a response"
    configuration:
      AlarmName: "IDR-APIGatewayHTTP-IntegrationLatency-${api_name}"
      AlarmDescription: "Measures the time taken between when API Gateway forwards a request to the backend and receives a response"
      MetricName: "IntegrationLatency"
      Namespace: "AWS/ApiGateway"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 3000.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "ApiId",
          Value: "${api_id}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway HTTP"
      }
    ]
