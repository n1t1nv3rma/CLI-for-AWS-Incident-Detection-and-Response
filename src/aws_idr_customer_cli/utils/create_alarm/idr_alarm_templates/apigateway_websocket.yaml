service_name: "API Gateway WebSocket"

templates:
  - name: "IDR-APIGatewayWebSocket-ClientError"
    service: "API Gateway WebSocket"
    alarm_type: "RELIABILITY"
    metric_type: "NATIVE"
    description: "Monitors WebSocket API client-side errors indicating issues with client requests"
    configuration:
      AlarmName: "IDR-APIGatewayWebSocket-ClientError-${api_name}"
      AlarmDescription: "Monitors WebSocket API client-side errors indicating issues with client requests"
      MetricName: "ClientError"
      Namespace: "AWS/ApiGateway"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 0.05
      ComparisonOperator: "GreaterThanThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "ApiId",
          Value: "${api_id}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway WebSocket"
      }
    ]

  - name: "IDR-APIGatewayWebSocket-ExecutionError"
    service: "API Gateway WebSocket"
    alarm_type: "RELIABILITY"
    metric_type: "NATIVE"
    description: "Monitors WebSocket API execution errors indicating backend integration failures"
    configuration:
      AlarmName: "IDR-APIGatewayWebSocket-ExecutionError-${api_name}"
      AlarmDescription: "Monitors WebSocket API execution errors indicating backend integration failures"
      MetricName: "ExecutionError"
      Namespace: "AWS/ApiGateway"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 0.05
      ComparisonOperator: "GreaterThanThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "ApiId",
          Value: "${api_id}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway WebSocket"
      }
    ]

  - name: "IDR-APIGatewayWebSocket-IntegrationLatency"
    service: "API Gateway WebSocket"
    alarm_type: "PERFORMANCE"
    metric_type: "NATIVE"
    description: "Measures the time taken between when API Gateway forwards a request to the backend and receives a response"
    configuration:
      AlarmName: "IDR-APIGatewayWebSocket-IntegrationLatency-${api_name}"
      AlarmDescription: "Measures the time taken between when API Gateway forwards a request to the backend and receives a response"
      MetricName: "IntegrationLatency"
      Namespace: "AWS/ApiGateway"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 3000.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "ApiId",
          Value: "${api_id}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "API Gateway WebSocket"
      }
    ]
